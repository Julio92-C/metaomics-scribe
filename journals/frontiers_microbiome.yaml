# Frontiers in Microbiology — manuscript template
# Source: https://www.frontiersin.org/journals/microbiology/for-authors/author-guidelines
# Update this file when the journal revises its guidelines.
#
# This template is study-agnostic: it carries only journal style + IMRaD
# structure, not the specific figures of any one paper. Per-paper figure
# emission lives in the pipeline's manifest.json (see MANIFEST_SCHEMA.md
# §"The `panels` stage"). The agent routes every `panel_composite` the
# pipeline emits — no journal-side allow-listing.

journal:
  id:        frontiers_microbiome
  name:      "Frontiers in Microbiology"
  publisher: "Frontiers Media"
  url:       "https://www.frontiersin.org/journals/microbiology"
  article_type: "Original Research"

manuscript:
  citation_style: "frontiers"   # CSL id; agent resolves to a .csl file
  max_word_count: 12000         # Original Research; excludes abstract, refs, captions
  max_main_tables: 5

  # IMRaD section order — drafted sequentially so later sections can ground
  # their prose on numbers established in earlier ones.
  #
  # Results subsections are abstract topic names. Each `panel_composite` in
  # the manifest carries a `subsection` field telling the drafter which one
  # it belongs to; the journal does not pin figure ids here.
  sections:
    - id: title
    - id: abstract
      max_words: 350
      structured: false
    - id: keywords
      min: 5
      max: 8
    - id: introduction
      grounded_in: []
    - id: methods
      grounded_in: [study, config, pipeline]
      subsections:
        - id: study_design
        - id: sample_collection_and_sequencing
        - id: bioinformatic_pipeline
        - id: statistical_analysis
    - id: results
      grounded_in: [stages]
      subsections:
        - id: community_overview
          title: "Community-level overview and composition"
        - id: resistome
          title: "Resistome"
        - id: virulome
          title: "Virulome"
        - id: mobilome
          title: "Mobilome"
        - id: taxa_gene_associations
          title: "Taxa - gene-element associations"
        - id: co_occurrence_network
          title: "Co-occurrence network and cross-domain correlations"
    - id: discussion
      grounded_in: [stages]
    - id: conclusion
      max_words: 200
    - id: data_availability_statement
    - id: author_contributions
    - id: funding
    - id: acknowledgments
    - id: conflict_of_interest
    - id: references

figures:
  # Frontiers accepts widths matching single column, 1.5 column, or double column.
  column_widths_mm:
    single:    85
    one_half:  120
    double:    180
  max_height_mm: 235
  font_min_pt:   8
  font_max_pt:   12
  dpi_min:       300
  dpi_preferred: 600
  formats: [tiff, eps, jpeg, pdf, png]
  preferred_format: tiff
  caption:
    position: below           # placed below figure in submission file
    bold_label: true          # "Figure 1." in bold
    max_words: 300

tables:
  format: docx                # editable tables required, not images
  caption:
    position: above
    bold_label: true

supplementary:
  numbering: "S{n}"           # Figure S1, Table S1, ...
  separate_file: true
  max_items: null             # no hard cap
  formats_accepted: [pdf, docx, xlsx, csv, tsv]
